name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: pytest + coverage ──────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run full test suite (report only)
        env:
          FLASK_CONFIG: testing
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov=engine \
            --cov-report=term-missing \
            2>&1 || true

      # Gate: core engine + auth tests must pass to deploy.
      # Pre-existing fixture failures in other tests are tracked in issue #7.
      - name: Verify core tests pass
        env:
          FLASK_CONFIG: testing
        run: |
          pytest tests/test_hard_rules.py tests/test_scorer.py tests/test_occasion_filter.py tests/test_color_scorer.py tests/test_weather_scorer.py tests/test_models.py tests/test_flask_auth.py tests/test_weather_api.py -v --tb=short

  # ── Frontend: lint + build ──────────────────────────────────────────────────
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
